<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Compare supermarket prices for your shopping list across UK stores. Find the cheapest shop near you." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#312e81" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-512.svg" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GShop" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GShop" />

    <!-- Open Graph -->
    <meta property="og:title" content="GShop - UK Grocery Price Comparison" />
    <meta property="og:description" content="Compare supermarket prices for your shopping list across UK stores." />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Stitch-style design system: Inter + Material Symbols + Tailwind (CDN) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              outline: '#707a6f',
              surface: '#f8f9ff',
              'secondary-fixed-dim': '#91db2a',
              'on-secondary-fixed': '#102000',
              'inverse-primary': '#8bd79b',
              'primary-fixed-dim': '#8bd79b',
              'surface-tint': '#1f6c3a',
              'surface-container-low': '#eef4ff',
              'surface-container-highest': '#dce3f0',
              'surface-bright': '#f8f9ff',
              'secondary-container': '#acf847',
              'surface-container-lowest': '#ffffff',
              background: '#f8f9ff',
              'secondary-fixed': '#acf847',
              tertiary: '#383588',
              'surface-container': '#e7eefb',
              primary: '#004c22',
              'surface-dim': '#d4dae7',
              'primary-container': '#166534',
              'on-primary-container': '#93e0a2',
              'on-secondary-container': '#457000',
              'on-primary': '#ffffff',
              'surface-container-high': '#e2e8f5',
              'on-tertiary': '#ffffff',
              'on-background': '#151c25',
              'on-secondary': '#ffffff',
              'on-surface': '#151c25',
              error: '#ba1a1a',
              'error-container': '#ffdad6',
              secondary: '#416900',
              'primary-fixed': '#a6f4b5',
              'on-surface-variant': '#404940',
              'surface-variant': '#dce3f0',
              'outline-variant': '#bfc9bd',
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', '2xl': '1rem', '3xl': '1.5rem', full: '9999px' },
            fontFamily: { headline: ['Inter'], body: ['Inter'], label: ['Inter'] }
          }
        }
      };
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { scrollbar-width: none; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      html.dark body { background-color: #020617; color: #f8f9ff; }
    </style>

    <title>GShop - UK Grocery Price Comparison</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
