<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Compare supermarket prices for your shopping list across UK stores. Find the cheapest shop near you." />

    <!-- PWA -->
    <link rel="manifest" href="/GShop/manifest.json" />
    <meta name="theme-color" content="#312e81" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/GShop/favicon.svg" />
    <link rel="apple-touch-icon" href="/GShop/icons/icon-512.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GShop" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GShop" />

    <!-- Open Graph -->
    <meta property="og:title" content="GShop - UK Grocery Price Comparison" />
    <meta property="og:description" content="Compare supermarket prices for your shopping list across UK stores." />
    <meta property="og:type" content="website" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Stitch-style design system: Inter + Material Symbols + Tailwind (CDN) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      /* Material Design 3 tokens — CSS variables swap on html.dark so every
         `bg-surface` / `text-on-surface` / etc. class works in both modes
         without sprinkling `dark:` variants through the components. */
      :root {
        --background: #f8f9ff;
        --surface: #f8f9ff;
        --surface-dim: #d4dae7;
        --surface-bright: #f8f9ff;
        --surface-container-lowest: #ffffff;
        --surface-container-low: #eef4ff;
        --surface-container: #e7eefb;
        --surface-container-high: #e2e8f5;
        --surface-container-highest: #dce3f0;
        --surface-variant: #dce3f0;
        --on-surface: #151c25;
        --on-surface-variant: #404940;
        --on-background: #151c25;
        --primary: #004c22;
        --primary-container: #166534;
        --on-primary: #ffffff;
        --on-primary-container: #93e0a2;
        --primary-fixed: #a6f4b5;
        --primary-fixed-dim: #8bd79b;
        --secondary: #416900;
        --secondary-container: #acf847;
        --on-secondary: #ffffff;
        --on-secondary-container: #457000;
        --secondary-fixed: #acf847;
        --secondary-fixed-dim: #91db2a;
        --tertiary: #383588;
        --tertiary-container: #504ea1;
        --on-tertiary: #ffffff;
        --on-tertiary-container: #ccc9ff;
        --outline: #707a6f;
        --outline-variant: #bfc9bd;
        --error: #ba1a1a;
        --error-container: #ffdad6;
        --on-error: #ffffff;
        --on-error-container: #93000a;
        --inverse-primary: #8bd79b;
        --inverse-surface: #2a313b;
        --inverse-on-surface: #eaf1fe;
      }
      html.dark {
        --background: #0f1113;
        --surface: #0f1113;
        --surface-dim: #0f1113;
        --surface-bright: #353a3e;
        --surface-container-lowest: #0f1113;
        --surface-container-low: #1b1d20;
        --surface-container: #1f2124;
        --surface-container-high: #282a2d;
        --surface-container-highest: #333538;
        --surface-variant: #404940;
        --on-surface: #e2e2e6;
        --on-surface-variant: #bfc9bd;
        --on-background: #e2e2e6;
        --primary: #8bd79b;
        --primary-container: #005226;
        --on-primary: #003918;
        --on-primary-container: #a6f4b5;
        --primary-fixed: #a6f4b5;
        --primary-fixed-dim: #8bd79b;
        --secondary: #acf847;
        --secondary-container: #416900;
        --on-secondary: #203600;
        --on-secondary-container: #acf847;
        --secondary-fixed: #acf847;
        --secondary-fixed-dim: #91db2a;
        --tertiary: #c3c0ff;
        --tertiary-container: #383588;
        --on-tertiary: #0b0067;
        --on-tertiary-container: #ccc9ff;
        --outline: #8a9389;
        --outline-variant: #404940;
        --error: #ffb4ab;
        --error-container: #93000a;
        --on-error: #690005;
        --on-error-container: #ffdad6;
        --inverse-primary: #006d33;
        --inverse-surface: #e2e2e6;
        --inverse-on-surface: #2f3033;
      }
      body { font-family: 'Inter', sans-serif; background-color: var(--background); color: var(--on-background); transition: background-color 0.3s ease, color 0.3s ease; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { scrollbar-width: none; }
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--surface-container-highest); border-radius: 10px; }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              surface: 'var(--surface)',
              'surface-dim': 'var(--surface-dim)',
              'surface-bright': 'var(--surface-bright)',
              'surface-container-lowest': 'var(--surface-container-lowest)',
              'surface-container-low': 'var(--surface-container-low)',
              'surface-container': 'var(--surface-container)',
              'surface-container-high': 'var(--surface-container-high)',
              'surface-container-highest': 'var(--surface-container-highest)',
              'surface-variant': 'var(--surface-variant)',
              'on-surface': 'var(--on-surface)',
              'on-surface-variant': 'var(--on-surface-variant)',
              'on-background': 'var(--on-background)',
              primary: 'var(--primary)',
              'primary-container': 'var(--primary-container)',
              'on-primary': 'var(--on-primary)',
              'on-primary-container': 'var(--on-primary-container)',
              'primary-fixed': 'var(--primary-fixed)',
              'primary-fixed-dim': 'var(--primary-fixed-dim)',
              secondary: 'var(--secondary)',
              'secondary-container': 'var(--secondary-container)',
              'on-secondary': 'var(--on-secondary)',
              'on-secondary-container': 'var(--on-secondary-container)',
              'secondary-fixed': 'var(--secondary-fixed)',
              'secondary-fixed-dim': 'var(--secondary-fixed-dim)',
              tertiary: 'var(--tertiary)',
              'tertiary-container': 'var(--tertiary-container)',
              'on-tertiary': 'var(--on-tertiary)',
              'on-tertiary-container': 'var(--on-tertiary-container)',
              outline: 'var(--outline)',
              'outline-variant': 'var(--outline-variant)',
              error: 'var(--error)',
              'error-container': 'var(--error-container)',
              'on-error': 'var(--on-error)',
              'on-error-container': 'var(--on-error-container)',
              'inverse-primary': 'var(--inverse-primary)',
              'inverse-surface': 'var(--inverse-surface)',
              'inverse-on-surface': 'var(--inverse-on-surface)',
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', '2xl': '1rem', '3xl': '1.5rem', full: '9999px' },
            fontFamily: { headline: ['Inter'], body: ['Inter'], label: ['Inter'] }
          }
        }
      };
    </script>

    <title>GShop - UK Grocery Price Comparison</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/GShop/sw.js', { scope: '/GShop/' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
